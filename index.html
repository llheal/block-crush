<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Block Crush! - 10x10ブロックパズルゲーム LINE Mini App" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Block Crush!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="game-container"></div>
  <div id="ui-overlay">
    <div id="header">
      <div id="score-section">
        <div class="score-label">SCORE</div>
        <div id="score-value" class="score-number">0</div>
      </div>
      <div id="best-section">
        <div class="score-label">BEST</div>
        <div id="best-value" class="score-number">0</div>
      </div>
    </div>
    <div id="combo-popup" class="hidden"></div>
    <div id="game-over-overlay" class="hidden">
      <div id="game-over-modal">
        <div id="game-over-title">GAME OVER</div>
        <div id="final-score-label">SCORE</div>
        <div id="final-score-value">0</div>
        <button id="restart-btn">PLAY AGAIN</button>
        <button id="share-btn" class="hidden">SHARE SCORE</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
